<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Intelligence</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%232f6fed"/><text x="32" y="43" font-family="-apple-system,sans-serif" font-size="32" font-weight="800" fill="white" text-anchor="middle">Ai</text></svg>'>
<style>
  :root {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --ink: #141e28;
    --ink-soft: #5b6b7b;
    --ink-faint: #8a97a5;
    --line: #e3e7ed;
    --accent: #2f6fed;
    --accent-deep: #1f56c4;
    --accent-soft: #eaf1ff;
    --go: #0e9f6e;
    --go-soft: #e6f6f0;
    --human: #d03050;
    --human-soft: #fdecef;
    --explore: #b7791f;
    --explore-soft: #fdf3e1;
    --hl: #f59e0b;
    --hl-soft: #fff7e8;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(20,30,40,.05), 0 6px 20px rgba(20,30,40,.06);
    --shadow-lift: 0 3px 6px rgba(20,30,40,.07), 0 14px 34px rgba(20,30,40,.11);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    background:
      radial-gradient(1200px 400px at 70% -180px, rgba(47,111,237,.07), transparent 60%),
      var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Topbar + nav ---------- */
  header.topbar {
    background: rgba(255,255,255,.86);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 26px;
    position: sticky;
    top: 0;
    z-index: 10;
    height: 56px;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; cursor: pointer; }
  .brand-sep { width: 1px; height: 18px; background: var(--line); align-self: center; }
  .brand h1 { font-size: 16.5px; font-weight: 800; letter-spacing: -.015em; }
  .brand h1 span { color: var(--accent); }
  .brand .sub { font-size: 12px; color: var(--ink-faint); }
  nav.tabs { display: flex; gap: 4px; height: 100%; }
  nav.tabs .tab {
    display: flex; align-items: center;
    padding: 0 14px;
    font-size: 13.5px; font-weight: 650;
    color: var(--ink-soft);
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    transition: color .12s ease;
  }
  nav.tabs .tab:hover { color: var(--ink); }
  nav.tabs .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .topbar-right { margin-left: auto; font-size: 12px; color: var(--ink-faint); }

  main { max-width: 1120px; margin: 0 auto; padding: 30px 28px 60px; animation: fadeIn .22s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ---------- Liste comptes ---------- */
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .page-title { font-size: 23px; font-weight: 800; letter-spacing: -.02em; }
  .page-sub { color: var(--ink-soft); font-size: 14px; margin-top: 2px; }
  .tier-stats { display: flex; gap: 8px; }
  .tier-stat { font-size: 12px; font-weight: 700; border-radius: 999px; padding: 4px 12px; }
  .tier-stat.GO { background: var(--go-soft); color: var(--go); }
  .tier-stat.EXPLORE { background: var(--explore-soft); color: var(--explore); }
  .tier-stat.HUMAN { background: var(--human-soft); color: var(--human); }

  .account-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px 22px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: transform .14s ease, box-shadow .14s ease, border-color .14s ease;
    position: relative;
  }
  .account-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lift); border-color: #d3dcea; }
  .account-card::after {
    content: "→";
    position: absolute; right: 20px; top: 20px;
    color: var(--ink-faint); font-size: 16px;
    transition: transform .14s ease, color .14s ease;
  }
  .account-card:hover::after { transform: translateX(3px); color: var(--accent); }
  .account-card .row1 { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding-right: 30px; }
  .account-card .name { font-size: 19px; font-weight: 800; letter-spacing: -.015em; }
  .account-card .meta { color: var(--ink-faint); font-size: 12.5px; font-weight: 500; }
  .account-card .why { margin-top: 8px; font-size: 15px; line-height: 1.45; color: var(--ink); max-width: 860px; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }

  /* Signals: attribute the provider before the content. The reader should see
     WHO said it (Sillage, historique HireSweet, FullEnrich) before WHAT it says. */
  .chips.signals { flex-direction: column; align-items: stretch; }
  .signal {
    display: flex; align-items: baseline; gap: 10px;
    background: #f8fafc;
    border: 1px solid #e7edf4;
    border-left: 3px solid #9aa7b4;
    border-radius: 8px;
    padding: 8px 12px;
  }
  .signal-src {
    text-transform: uppercase; letter-spacing: .07em;
    font-size: 9.5px; font-weight: 800; line-height: 1.6;
    padding: 2px 7px; border-radius: 5px; white-space: nowrap; flex: none;
    background: #eef1f5; color: #5b6b7b;
  }
  .signal.src-sillage    { border-left-color: #2f6fed; }
  .signal.src-deals      { border-left-color: #0e9f6e; }
  .signal.src-fullenrich { border-left-color: #e08a2e; }
  .src-sillage    .signal-src, .signal-src.src-sillage    { background: #e7f0ff; color: #1d4ed8; }
  .src-deals      .signal-src, .signal-src.src-deals      { background: #e4f7ef; color: #0b7a55; }
  .src-fullenrich .signal-src, .signal-src.src-fullenrich { background: #fdf1e3; color: #a55c10; }

  .signal-body { flex: 1; min-width: 0; }
  .signal-label { font-weight: 750; font-size: 12.5px; color: var(--ink); margin-right: 7px; }
  .signal-detail { font-size: 13px; color: #46566a; }
  .signal-date { font-size: 11px; color: var(--ink-faint); white-space: nowrap; flex: none; font-variant-numeric: tabular-nums; }

  /* Contact coordinates, attributed to the provider that produced them. */
  .coord { display: flex; align-items: center; gap: 8px; margin: 5px 0; font-size: 13.5px; }
  .coord-icon { flex: none; }
  .coord-val { color: #2a3746; overflow-wrap: anywhere; }
  .coord-src { margin-left: auto; }

  .chip {
    font-size: 12px;
    background: var(--accent-soft);
    color: var(--accent-deep);
    border-radius: 999px;
    padding: 3.5px 11px;
    font-weight: 600;
  }
  .chip .src { opacity: .6; font-weight: 500; }
  .chip.inv { background: #f0edfd; color: #5b45c9; }
  .chip.inv.portfolio { background: var(--go-soft); color: var(--go); }

  .tier {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .07em;
    border-radius: 6px;
    padding: 3px 9px;
  }
  .tier.GO      { background: var(--go-soft); color: var(--go); }
  .tier.HUMAN   { background: var(--human-soft); color: var(--human); }
  .tier.EXPLORE { background: var(--explore-soft); color: var(--explore); }
  .tier.SKIP    { background: #eef0f3; color: var(--ink-soft); }

  /* ---------- Vue compte ---------- */
  .account-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .back { color: var(--accent); font-size: 13.5px; font-weight: 650; cursor: pointer; }
  .back:hover { text-decoration: underline; }
  .next-account {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 7px 14px;
    font-size: 13px; font-weight: 650;
    color: var(--ink-soft);
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: color .12s ease, border-color .12s ease, transform .12s ease;
    font-family: inherit;
  }
  .next-account:hover { color: var(--accent); border-color: var(--accent); transform: translateX(2px); }

  .account-head {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px 24px;
    margin-bottom: 18px;
  }
  .verdict-banner {
    margin-top: 14px;
    border-radius: 11px;
    padding: 13px 15px;
    font-size: 14px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .verdict-banner.GO { background: var(--go-soft); color: #085c40; }
  .verdict-banner.HUMAN { background: var(--human-soft); color: #8c1f37; }
  .verdict-banner.EXPLORE { background: var(--explore-soft); color: #7c5310; }
  .verdict-banner .icon { font-size: 16px; line-height: 1.4; }

  .section-label {
    font-size: 11.5px;
    font-weight: 800;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 26px 0 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after { content: ""; flex: 1; height: 1px; background: var(--line); }

  /* Investisseurs */
  .investors { display: flex; gap: 12px; flex-wrap: wrap; }
  .investor-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 13px 16px;
    min-width: 250px;
  }
  .investor-card .iname { font-weight: 750; font-size: 14.5px; display: flex; align-items: center; gap: 8px; }
  .investor-card .imeta { color: var(--ink-soft); font-size: 12.5px; margin-top: 1px; }
  .investor-card .inote { font-size: 13px; margin-top: 7px; color: var(--ink); max-width: 320px; }
  .badge-portfolio {
    font-size: 10.5px; font-weight: 800; letter-spacing: .04em;
    background: var(--go-soft); color: var(--go);
    border-radius: 999px; padding: 2px 9px;
  }

  /* Graphe connexions */
  .conn-wrap {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px 20px;
  }
  .conn-svg { width: 100%; height: auto; display: block; }
  .conn-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px; font-size: 12px; color: var(--ink-soft); }
  .conn-legend .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: 1px; }

  /* Organigramme */
  .org { display: flex; flex-direction: column; gap: 18px; }
  .org-level { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; position: relative; }
  .org-level + .org-level::before {
    content: "";
    position: absolute; top: -18px; left: 50%;
    width: 1.5px; height: 18px;
    background: var(--line);
  }
  .person-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    width: 242px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform .13s ease, box-shadow .13s ease;
    position: relative;
  }
  .person-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lift); }
  .person-card.highlighted { border: 2px solid var(--hl); background: var(--hl-soft); }
  .person-card.selected { outline: 3px solid var(--accent); outline-offset: 1px; }
  .person-card .pname { font-weight: 750; font-size: 15px; }
  .person-card .prole { color: var(--ink-soft); font-size: 13px; margin-top: 1px; }
  .badge-target {
    position: absolute; top: -9px; right: 10px;
    background: var(--hl); color: #fff;
    font-size: 10px; font-weight: 800; letter-spacing: .06em;
    padding: 2.5px 9px; border-radius: 999px;
    box-shadow: 0 2px 6px rgba(245,158,11,.4);
  }
  .status {
    display: inline-block; margin-top: 9px;
    font-size: 11.5px; font-weight: 700;
    border-radius: 6px; padding: 2px 8px;
  }
  .status.never { background: #eef0f3; color: var(--ink-soft); }
  .status.contacted { background: var(--explore-soft); color: var(--explore); }
  .status.client { background: var(--human-soft); color: var(--human); }

  /* ---------- Layout compte + panneau ---------- */
  .account-layout { display: grid; grid-template-columns: 1fr; gap: 18px; }
  .account-layout.with-panel { grid-template-columns: minmax(0, 1fr) 404px; align-items: start; }

  .brief-panel {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lift);
    padding: 20px;
    position: sticky;
    top: 76px;
    max-height: calc(100vh - 96px);
    overflow-y: auto;
    animation: slideIn .18s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateX(14px); } to { opacity: 1; transform: none; } }
  .brief-panel .close { float: right; cursor: pointer; color: var(--ink-faint); font-size: 19px; line-height: 1; }
  .brief-panel .close:hover { color: var(--ink); }
  .brief-panel h2 { font-size: 18px; letter-spacing: -.015em; font-weight: 800; }
  .brief-panel .prole { color: var(--ink-soft); font-size: 13.5px; margin-bottom: 10px; }
  .coords { font-size: 13px; color: var(--ink-soft); margin-bottom: 4px; word-break: break-all; }
  .pitch-box {
    background: linear-gradient(135deg, #eef4ff, #f6f0ff);
    border: 1px solid #dbe6fb;
    border-radius: 10px;
    padding: 11px 13px;
    margin-top: 12px;
    font-size: 13.5px;
  }
  .pitch-box .k { font-size: 10.5px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--accent-deep); margin-bottom: 3px; }
  .brief-section { margin-top: 14px; }
  .brief-section .k {
    font-size: 11px; font-weight: 800; letter-spacing: .08em;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 3px;
  }
  .brief-section .v { font-size: 14px; }
  .brief-section ul { padding-left: 18px; font-size: 14px; }
  .brief-section li { margin-bottom: 4px; }
  .empty-proof { color: var(--ink-faint); font-style: italic; font-size: 13.5px; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    border: none; border-radius: 10px;
    padding: 11px 18px;
    font-size: 14px; font-weight: 700;
    cursor: pointer; margin-top: 18px;
    font-family: inherit;
    transition: background .12s ease, transform .12s ease;
  }
  .btn.primary { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(47,111,237,.3); }
  .btn.primary:hover { background: var(--accent-deep); transform: translateY(-1px); }
  .btn.blocked { background: var(--human-soft); color: var(--human); cursor: not-allowed; border: 1.5px dashed var(--human); }
  .btn.ghost { background: #eef0f3; color: var(--ink-soft); cursor: default; }
  .btn.explore { background: var(--explore-soft); color: var(--explore); cursor: not-allowed; border: 1.5px dashed var(--explore); }
  .btn.refresh { background: #eef0f3; color: var(--ink-soft); margin-top: 0; padding: 6px 13px; font-size: 12.5px; }
  .btn.refresh:hover:not(:disabled) { background: var(--accent-soft); color: var(--accent-deep); }
  .btn.refresh:disabled { cursor: progress; opacity: .8; }
  .refresh-row { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; margin-top: 8px; }
  .refresh-stamp, .refresh-msg { font-size: 11.5px; color: var(--ink-faint); }
  .refresh-msg { color: var(--human); }

  .gate-box {
    margin-top: 12px;
    background: var(--human-soft);
    border: 1px solid #f3c2ce;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13.5px;
    color: #8c1f37;
  }
  .gate-box.explore { background: var(--explore-soft); border-color: #ecd9ae; color: #7c5310; }
  .gate-box .gate-title { font-weight: 800; letter-spacing: .05em; font-size: 11.5px; text-transform: uppercase; margin-bottom: 4px; }

  .draft-box {
    margin-top: 14px;
    background: #fbfcfe;
    border: 1px solid var(--line);
    border-radius: 11px;
    padding: 14px 16px;
    animation: slideIn .18s ease;
  }
  .draft-box .draft-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .draft-box .draft-title { font-size: 11.5px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--go); }
  .draft-box pre { white-space: pre-wrap; font-family: inherit; font-size: 13.5px; line-height: 1.55; }
  .copy-btn {
    background: #eef0f3; border: none; border-radius: 7px;
    padding: 4px 11px; font-size: 12px; font-weight: 700;
    cursor: pointer; color: var(--ink-soft); font-family: inherit;
    transition: background .12s ease, color .12s ease;
  }
  .copy-btn:hover { background: var(--accent-soft); color: var(--accent); }
  .draft-note { margin-top: 8px; font-size: 12px; color: var(--ink-faint); }

  /* ---------- Intégrations ---------- */
  .integr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); gap: 14px; }
  .integr-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 17px 18px;
    display: flex; flex-direction: column; gap: 9px;
    transition: transform .13s ease, box-shadow .13s ease;
  }
  .integr-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lift); }
  .integr-head { display: flex; align-items: center; gap: 11px; }
  .integr-logo {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800; color: #fff;
    flex-shrink: 0;
  }
  .integr-name { font-weight: 750; font-size: 15px; }
  .integr-cat { font-size: 12px; color: var(--ink-faint); }
  .integr-desc { font-size: 13px; color: var(--ink-soft); flex: 1; }
  .integr-detail { font-size: 12px; color: var(--ink-faint); }
  .integr-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11.5px; font-weight: 750;
    border-radius: 999px; padding: 3px 10px;
  }
  .pill.connected { background: var(--go-soft); color: var(--go); }
  .pill.available { background: #eef0f3; color: var(--ink-soft); }
  .pill .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .connect-btn {
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px;
    padding: 6px 13px; font-size: 12.5px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: background .12s ease;
  }
  .connect-btn:hover { background: var(--accent-deep); }
  .connect-btn.disconnect { background: #eef0f3; color: var(--ink-soft); }
  .connect-btn.disconnect:hover { background: var(--human-soft); color: var(--human); }
  .mock-note {
    margin-top: 20px; font-size: 12.5px; color: var(--ink-faint);
    background: var(--surface); border: 1px dashed var(--line);
    border-radius: 10px; padding: 10px 14px;
  }

  /* ---------- Onglet Agent ---------- */
  .agent-cmdbar { display: flex; gap: 10px; margin-bottom: 10px; }
  .agent-input {
    flex: 1;
    border: 1.5px solid var(--line);
    border-radius: 11px;
    padding: 12px 16px;
    font-size: 14.5px;
    font-family: inherit;
    background: var(--surface);
    box-shadow: var(--shadow);
    outline: none;
    transition: border-color .12s ease;
  }
  .agent-input:focus { border-color: var(--accent); }
  .agent-input.small { padding: 9px 13px; font-size: 13.5px; }
  .btn.small { padding: 9px 14px; margin-top: 0; font-size: 13px; }
  .agent-send { margin-top: 0; }
  .agent-suggestions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .agent-chip {
    font-size: 12.5px; font-weight: 650;
    background: var(--surface); color: var(--ink-soft);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 5px 13px; cursor: pointer;
    transition: color .12s ease, border-color .12s ease;
  }
  .agent-chip:hover { color: var(--accent); border-color: var(--accent); }

  .agent-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 900px) { .agent-grid { grid-template-columns: 1fr; } }
  .agent-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px 20px;
  }
  .agent-card-title { font-weight: 750; font-size: 15px; margin-bottom: 3px; }
  .agent-card-sub { font-size: 13px; color: var(--ink-soft); margin-bottom: 12px; }
  .agent-addlead { display: flex; gap: 8px; margin-bottom: 6px; }
  .agent-addlead .agent-input { box-shadow: none; }

  .pipe-title { font-size: 13px; color: var(--ink-soft); margin: 12px 0 8px; }
  .pipe-steps { display: flex; flex-direction: column; gap: 8px; }
  .pipe-step { display: flex; gap: 10px; align-items: flex-start; font-size: 13.5px; opacity: .45; }
  .pipe-step.running, .pipe-step.done { opacity: 1; }
  .pipe-dot {
