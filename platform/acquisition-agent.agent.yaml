# Claude Managed Agents — the acquisition agent (control plane).
#
# `npm run platform:setup` (src/platform/setup.js) is the canonical path and
# keeps this in sync via src/platform/agent-config.js. This YAML is the `ant`
# CLI equivalent, for a version-controlled / CI workflow:
#
#   AGENT_ID=$(ant beta:agents create < platform/acquisition-agent.agent.yaml --transform id -r)
#   # push a new version after editing:
#   ant beta:agents update --agent-id "$AGENT_ID" --version N < platform/acquisition-agent.agent.yaml
#
# MCP auth is NOT here — it lives in a vault attached at session-create time.
name: wake-acquisition-agent
model: claude-opus-4-8
system: "@./platform/system-prompt.md"

mcp_servers:
  # Fill the URLs from the hackathon onboarding, or drop a server to run without it.
  - type: url
    name: sillage
    url: "${SILLAGE_MCP_URL}"
  - type: url
    name: fullenrich
    url: "${FULLENRICH_MCP_URL}"

tools:
  - type: agent_toolset_20260401
  - type: mcp_toolset
    mcp_server_name: sillage
  - type: mcp_toolset
    mcp_server_name: fullenrich

  # Host-side guardrails — executed in our process, not the sandbox.
  - type: custom
    name: record_enrichment
    description: >-
      Write a verified contact (from FullEnrich) back to the operator store so an
      email action can pass the gate. Call after enriching a contact you intend to email.
    input_schema:
      type: object
      properties:
        personId: { type: string }
        email: { type: string }
        emailStatus: { type: string, enum: [verified, unverified] }
        phone: { type: string }
        source: { type: string }
      required: [personId, email, emailStatus, source]

  - type: custom
    name: propose_action
    description: >-
      Propose one activation (draft only — never sent). Runs the operator
      fail-closed gate and returns whether it passed and, if not, why.
    input_schema:
      type: object
      properties:
        kind: { type: string, enum: [intro_request, outreach_email, followup_task] }
        channel: { type: string, enum: [email, linkedin, task] }
        companyId: { type: string }
        targetPersonId: { type: string }
        evidenceSignalIds:
          type: array
          items: { type: string }
        payload:
          type: object
          properties:
            subject: { type: string }
            body: { type: string }
            message: { type: string }
            task: { type: string }
        reason: { type: string }
      required: [kind, channel, companyId, evidenceSignalIds, payload]
